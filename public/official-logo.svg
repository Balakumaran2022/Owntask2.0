<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="checkGrad" x1="20%" y1="80%" x2="80%" y2="20%">
      <stop offset="0%" stop-color="#008000" />
      <stop offset="100%" stop-color="#0dfa19" />
    </linearGradient>
    <clipPath id="cut-top">
      <!-- Cut off the very top horizontally to create the flat end on the right -->
      <rect x="0" y="18" width="100" height="100" />
    </clipPath>
  </defs>
  <rect width="100" height="100" fill="#000000" />
  
  <path d="M 22 55 L 45 75 L 85 10" 
        stroke="url(#checkGrad)" 
        stroke-width="19" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        clip-path="url(#cut-top)" />
</svg>
